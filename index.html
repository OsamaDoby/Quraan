<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذاعة القرآن الكريم - بث مباشر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030407;
            --card-bg: rgba(10, 12, 18, 0.9);
            --neon-color: #00f2ff;
            --text-color: #ffffff;
            --glow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.95);
            --neon-color: #007bff;
            --text-color: #1a1a1a;
            --glow: 0 5px 15px rgba(0, 123, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* تحسين الاستجابة (Responsive) */
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            border: 2px solid var(--neon-color);
            box-shadow: var(--glow);
            text-align: center;
            backdrop-filter: blur(15px);
            position: relative;
            margin: auto; /* لضمان التوسط في كل الشاشات */
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        h1 { font-size: clamp(1.2rem, 5vw, 1.8rem); margin: 10px 0; text-shadow: var(--glow); }

        .spiritual-card {
            background: rgba(0, 242, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            font-size: 0.9rem;
            border-right: 4px solid var(--neon-color);
        }

        .hadith-section {
            font-style: italic;
            color: var(--neon-color);
            margin-top: 15px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        audio { width: 100%; margin: 20px 0; filter: drop-shadow(0 0 5px var(--neon-color)); }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: clamp(15px, 5vw, 30px);
            margin: 25px 0;
        }

        .social-icons a {
            font-size: 1.6rem;
            color: var(--text-color);
            transition: 0.3s ease;
        }

        .social-icons a:hover { color: var(--neon-color); transform: translateY(-5px); }

        .share-btn {
            background: var(--neon-color);
            color: #000;
            padding: 12px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo';
        }

        /* خلفية نيون متحركة خفيفة */
        .neon-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            background: var(--neon-color);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="neon-bg"></div>

    <div class="container">
        <div class="top-controls">
            <button class="action-btn" onclick="toggleTheme()" title="تغيير الوضع"><i class="fas fa-moon"></i></button>
            <button class="action-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>

        <h1 id="title">إذاعة القرآن الكريم</h1>
        <p id="subtitle" style="opacity: 0.8;">بث مباشر من القاهرة</p>

        <div class="spiritual-card" id="quote">
            نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين.
        </div>

        <audio id="mainPlayer" controls>
            <source src="https://n02.radiojar.com/8s5u8tp7sq5tv?rj-tok=AAABf" type="audio/mpeg">
        </audio>

        <p style="font-size: 0.7rem; cursor: pointer;" onclick="refreshStream()"><i class="fas fa-sync"></i> تحديث البث إذا توقف</p>

        <div class="hadith-section" id="hadith">
            قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"
        </div>

        <div class="social-icons">
            <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/Osama.Omar.MS?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <button class="share-btn" onclick="share()"><i class="fas fa-share-alt"></i> <span id="shareTxt">نشر الثواب (مشاركة)</span></button>
    </div>

    <script>
        const player = document.getElementById('mainPlayer');

        function refreshStream() {
            player.src = "https://n02.radiojar.com/8s5u8tp7sq5tv?v=" + Math.random();
            player.play();
        }

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            document.querySelector('.action-btn i').className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        let isAr = true;
        function toggleLanguage() {
            isAr = !isAr;
            document.documentElement.lang = isAr ? 'ar' : 'en';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            
            document.getElementById('title').innerText = isAr ? "إذاعة القرآن الكريم" : "Quran Radio";
            document.getElementById('subtitle').innerText = isAr ? "بث مباشر من القاهرة" : "Live from Cairo";
            document.getElementById('shareTxt').innerText = isAr ? "نشر الثواب (مشاركة)" : "Share & Earn Blessings";
            document.getElementById('langBtn').innerText = isAr ? "EN" : "AR";
            document.getElementById('quote').innerText = isAr ? 
                "نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين." : 
                "Please pray for everyone who contributed to this work and for all deceased Muslims.";
            document.getElementById('hadith').innerText = isAr ? 
                'قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"' : 
                'Prophet Muhammad (PBUH) said: "Whoever guides someone to goodness will have a reward like one who did it."';
        }

        function share() {
            if (navigator.share) {
                navigator.share({ title: 'إذاعة القرآن الكريم', url: window.location.href });
            } else {
                alert("انسخ الرابط وانشره لتنال الأجر بإذن الله");
            }
        }
    </script>
</body>
</html>
