<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذاعة القرآن الكريم - بث مباشر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030508;
            --card-bg: rgba(10, 14, 20, 0.98);
            --neon-color: #00f2ff;
            --text-color: #ffffff;
            --glow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f4f7f6;
            --card-bg: rgba(255, 255, 255, 0.98);
            --neon-color: #0062ff;
            --text-color: #1a1c22;
            --glow: 0 5px 20px rgba(0, 98, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 40px;
            border: 2px solid var(--neon-color);
            box-shadow: var(--glow);
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .action-btn {
            background: none;
            border: 1.5px solid var(--neon-color);
            color: var(--neon-color);
            width: 45px;
            height: 45px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .action-btn:hover { background: var(--neon-color); color: #000; }

        h1 { font-size: 1.8rem; font-weight: 900; text-shadow: var(--glow); margin-bottom: 5px; }

        .quote-box {
            background: rgba(0, 242, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 1rem;
            border-right: 5px solid var(--neon-color);
            line-height: 1.6;
        }

        /* الحديث النبوي - وضوح تام وعريض */
        .hadith-text {
            color: var(--neon-color);
            font-weight: 900;
            font-size: 1.25rem;
            margin: 30px 0;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        audio { width: 100%; margin: 15px 0; filter: drop-shadow(0 0 8px var(--neon-color)); }

        .refresh-trigger {
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--neon-color);
            display: inline-block;
            padding: 10px 20px;
            transition: 0.3s;
            border-radius: 50px;
            border: 1px solid transparent;
        }

        /* نبض نيون عند الضغط */
        .neon-pulse-active {
            animation: pulse-ring 0.6s ease-out;
            border-color: var(--neon-color);
            background: rgba(0, 242, 255, 0.1);
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(0, 242, 255, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 242, 255, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(0, 242, 255, 0); }
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
        }

        .social-icons a { font-size: 1.8rem; color: var(--text-color); transition: 0.3s; }
        .social-icons a:hover { color: var(--neon-color); transform: translateY(-5px); }

        .share-main-btn {
            background: var(--neon-color);
            color: #000;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            box-shadow: var(--glow);
            font-family: 'Cairo';
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-controls">
            <button class="action-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="action-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>

        <h1 id="title">إذاعة القرآن الكريم</h1>
        <p style="opacity: 0.7; margin-bottom: 25px;" id="subtitle">من القاهرة - بث مباشر</p>

        <div class="quote-box" id="quote">
            نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة.
        </div>

        <audio id="myaudio" controls autoplay>
            <source rel="noreferrer nofollow" src="https://stream.radiojar.com/8s5u5tpdtwzuv" type="audio/mp3">
            متصفحك لا يدعم تشغيل الصوت.
        </audio>

        <div id="refreshBtn" class="refresh-trigger" onclick="reloadRadio()">
            <i class="fas fa-sync-alt"></i> <span id="refreshTxt">تحديث الاتصال بالبث</span>
        </div>

        <div class="hadith-text" id="hadith">
            قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"
        </div>

        <div class="social-icons">
            <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/Osama.Omar.MS?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <button class="share-main-btn" onclick="share()"><i class="fas fa-share-alt"></i> <span id="shareTxt">نشر الثواب (مشاركة)</span></button>
    </div>

    <script>
        const audio = document.getElementById('myaudio');

        function reloadRadio() {
            // إضافة تأثير النيون البصري
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('neon-pulse-active');
            setTimeout(() => btn.classList.remove('neon-pulse-active'), 600);

            // إعادة تحميل الرابط
            audio.src = "https://stream.radiojar.com/8s5u5tpdtwzuv?t=" + new Date().getTime();
            audio.load();
            audio.play();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        let isAr = true;
        function toggleLanguage() {
            isAr = !isAr;
            document.documentElement.lang = isAr ? 'ar' : 'en';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            
            document.getElementById('title').innerText = isAr ? "إذاعة القرآن الكريم" : "Quran Radio";
            document.getElementById('subtitle').innerText = isAr ? "من القاهرة - بث مباشر" : "Live from Cairo";
            document.getElementById('refreshTxt').innerText = isAr ? "تحديث الاتصال بالبث" : "Reconnect Stream";
            document.getElementById('shareTxt').innerText = isAr ? "نشر الثواب (مشاركة)" : "Share & Earn Reward";
            document.getElementById('langBtn').innerText = isAr ? "EN" : "AR";
            document.getElementById('quote').innerText = isAr ? 
                "نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة." : 
                "Please pray for everyone who contributed to this work, and for all deceased Muslims.";
            document.getElementById('hadith').innerText = isAr ? 
                'قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"' : 
                'Prophet Muhammad (PBUH) said: "Whoever guides someone to goodness will have a similar reward."';
        }

        function share() {
            if (navigator.share) {
                navigator.share({ title: 'إذاعة القرآن الكريم', url: window.location.href });
            } else {
                alert("تم نسخ رابط الموقع، انشره لتنال الأجر!");
            }
        }
    </script>
</body>
</html>
