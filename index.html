<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذاعة القرآن الكريم - بث مباشر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(15, 20, 28, 0.95);
            --neon-color: #00f2ff;
            --text-color: #ffffff;
            --glow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.98);
            --neon-color: #0062ff;
            --text-color: #1a202c;
            --glow: 0 5px 15px rgba(0, 98, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            transition: 0.5s;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 40px;
            border: 2px solid var(--neon-color);
            box-shadow: var(--glow);
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .action-btn {
            background: none;
            border: 1.5px solid var(--neon-color);
            color: var(--neon-color);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        h1 { font-size: 1.8rem; font-weight: 900; text-shadow: var(--glow); margin: 10px 0; }

        .quote-box {
            background: rgba(0, 242, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 0.95rem;
            border-right: 5px solid var(--neon-color);
        }

        /* الحديث النبوي بخط واضح جداً */
        .hadith-text {
            color: var(--neon-color);
            font-weight: 800;
            font-size: 1.2rem;
            margin: 25px 0;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        audio { width: 100%; margin: 15px 0; border-radius: 50px; }

        /* تأثير التحديث (Pulse Animation) */
        .refresh-btn {
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--neon-color);
            display: inline-block;
            padding: 10px;
            transition: 0.3s;
            border-radius: 10px;
        }

        .refresh-active {
            animation: neon-pulse 0.5s ease-in-out;
            text-shadow: 0 0 15px var(--neon-color);
        }

        @keyframes neon-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--neon-color); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--neon-color); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--neon-color); }
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
        }

        .social-icons a { font-size: 1.8rem; color: var(--text-color); transition: 0.3s; }
        .social-icons a:hover { color: var(--neon-color); transform: translateY(-5px); }

        .share-btn {
            background: var(--neon-color);
            color: #000;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            box-shadow: var(--glow);
            font-family: 'Cairo';
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-controls">
            <button class="action-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="action-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>

        <h1 id="title">إذاعة القرآن الكريم</h1>
        <p id="subtitle" style="opacity: 0.7;">بث مباشر من القاهرة</p>

        <div class="quote-box" id="quote">
            نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة.
        </div>

        <audio id="mainPlayer" controls>
            <source src="https://n0a.radiojar.com/8s5u8tp7sq5tv?rj-tok=AAABf" type="audio/mpeg">
        </audio>

        <div id="refreshWrapper" class="refresh-btn" onclick="refreshStream()">
            <i class="fas fa-sync-alt"></i> <span id="refreshTxt">تحديث البث إذا توقف</span>
        </div>

        <div class="hadith-text" id="hadith">
            قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"
        </div>

        <div class="social-icons">
            <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/Osama.Omar.MS?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <button class="share-btn" onclick="share()"><i class="fas fa-share-alt"></i> <span id="shareTxt">مشاركة الموقع (صدقة جارية)</span></button>
    </div>

    <script>
        const player = document.getElementById('mainPlayer');

        function refreshStream() {
            // إضافة تأثير النيون
            const btn = document.getElementById('refreshWrapper');
            btn.classList.add('refresh-active');
            setTimeout(() => btn.classList.remove('refresh-active'), 500);

            // تحديث الرابط
            player.src = "https://n0a.radiojar.com/8s5u8tp7sq5tv?v=" + Math.random();
            player.load();
            player.play().catch(e => console.log("تفاعل المستخدم مطلوب للتشغيل"));
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        let isAr = true;
        function toggleLanguage() {
            isAr = !isAr;
            document.documentElement.lang = isAr ? 'ar' : 'en';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            
            document.getElementById('title').innerText = isAr ? "إذاعة القرآن الكريم" : "Quran Radio";
            document.getElementById('subtitle').innerText = isAr ? "بث مباشر من القاهرة" : "Live from Cairo";
            document.getElementById('refreshTxt').innerText = isAr ? "تحديث البث إذا توقف" : "Refresh Stream";
            document.getElementById('shareTxt').innerText = isAr ? "مشاركة الموقع (صدقة جارية)" : "Share (Sadaqah Jariyah)";
            document.getElementById('langBtn').innerText = isAr ? "EN" : "AR";
            document.getElementById('quote').innerText = isAr ? 
                "نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة." : 
                "Please pray for everyone who contributed to this work, and for all deceased Muslims.";
            document.getElementById('hadith').innerText = isAr ? 
                'قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"' : 
                'Prophet Muhammad (PBUH) said: "Whoever guides someone to goodness will have a similar reward."';
        }

        function share() {
            if (navigator.share) {
                navigator.share({ title: 'إذاعة القرآن الكريم', url: window.location.href });
            } else {
                alert("تم نسخ رابط الموقع، انشره لتنال الأجر!");
            }
        }
    </script>
</body>
</html>
