<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذاعة القرآن الكريم - بث مباشر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030508;
            --card-bg: rgba(13, 17, 23, 0.95);
            --neon-color: #00f2ff;
            --text-color: #ffffff;
            --glow: 0 0 25px rgba(0, 242, 255, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f5f7f9;
            --card-bg: rgba(255, 255, 255, 0.98);
            --neon-color: #0062ff;
            --text-color: #1a1c22;
            --glow: 0 5px 20px rgba(0, 98, 255, 0.2);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px; /* حجم مثالي للشاشات الكبيرة والصغيرة */
            background: var(--card-bg);
            padding: 35px 25px;
            border-radius: 35px;
            border: 2px solid var(--neon-color);
            box-shadow: var(--glow);
            text-align: center;
            backdrop-filter: blur(20px);
            position: relative;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--neon-color);
            color: var(--neon-color);
            width: 45px;
            height: 45px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .action-btn:hover { background: var(--neon-color); color: #000; box-shadow: var(--glow); }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; text-shadow: var(--glow); }
        .subtitle { opacity: 0.7; font-size: 1rem; margin-bottom: 25px; }

        .quote-box {
            background: rgba(0, 242, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.6;
            border-right: 5px solid var(--neon-color);
        }

        /* تحسين خط الحديث النبوي */
        .hadith-text {
            color: var(--neon-color);
            font-weight: 700;
            font-size: 1.1rem; /* تكبير الخط قليلاً */
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
        }

        audio { 
            width: 100%; 
            margin: 15px 0; 
            filter: drop-shadow(0 0 8px var(--neon-color)); 
            height: 40px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }

        .social-icons a {
            font-size: 1.8rem;
            color: var(--text-color);
            transition: 0.4s;
        }

        .social-icons a:hover { color: var(--neon-color); transform: scale(1.2); }

        .share-btn {
            background: var(--neon-color);
            color: #000;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo';
            box-shadow: var(--glow);
            transition: 0.3s;
        }

        .share-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-controls">
            <button class="action-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="action-btn" onclick="toggleLanguage()" id="langBtn">EN</button>
        </div>

        <h1 id="title">إذاعة القرآن الكريم</h1>
        <p class="subtitle" id="subtitle">من القاهرة - بث مباشر 24 ساعة</p>

        <div class="quote-box" id="quote">
            نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة.
        </div>

        <audio id="mainPlayer" controls>
            <source src="https://stream.zeno.fm/f96at6286m0uv" type="audio/mpeg">
            متصفحك لا يدعم البث المباشر.
        </audio>

        <p style="font-size: 0.8rem; cursor: pointer; color: var(--neon-color);" onclick="refreshStream()">
            <i class="fas fa-sync-alt"></i> تحديث البث إذا توقف
        </p>

        <div class="hadith-text" id="hadith">
            قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"
        </div>

        <div class="social-icons">
            <a href="https://wa.me/message/FJEGUNCJ4JX7P1" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/Osama.Omar.MS?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/osamamasrawy?igsh=MWJqcnhhMWd6MjNxNQ%3D%3D" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <button class="share-btn" onclick="share()"><i class="fas fa-share-alt"></i> <span id="shareTxt">مشاركة الموقع (صدقة جارية)</span></button>
    </div>

    <script>
        const player = document.getElementById('mainPlayer');

        // رابط بديل في حال تعطل الأول
        function refreshStream() {
            const streamUrl = "https://stream.zeno.fm/f96at6286m0uv?v=" + Math.random();
            player.src = streamUrl;
            player.load();
            player.play();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        let isAr = true;
        function toggleLanguage() {
            isAr = !isAr;
            document.documentElement.lang = isAr ? 'ar' : 'en';
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            
            const content = {
                ar: {
                    title: "إذاعة القرآن الكريم",
                    subtitle: "من القاهرة - بث مباشر 24 ساعة",
                    quote: "نسألكم الدعاء لكل من ساهم في هذا العمل بظهر الغيب، ولأمواتنا وأموات المسلمين بالرحمة والمغفرة.",
                    hadith: 'قال رسول الله ﷺ: "مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ"',
                    share: "مشاركة الموقع (صدقة جارية)",
                    lang: "EN"
                },
                en: {
                    title: "Quran Radio",
                    subtitle: "Cairo - 24/7 Live Stream",
                    quote: "Please pray for those who contributed to this work, and for all deceased Muslims with mercy.",
                    hadith: 'Prophet Muhammad (PBUH) said: "Whoever guides someone to goodness will have a similar reward."',
                    share: "Share & Earn Reward",
                    lang: "AR"
                }
            };

            const lang = isAr ? content.ar : content.en;
            document.getElementById('title').innerText = lang.title;
            document.getElementById('subtitle').innerText = lang.subtitle;
            document.getElementById('quote').innerText = lang.quote;
            document.getElementById('hadith').innerText = lang.hadith;
            document.getElementById('shareTxt').innerText = lang.share;
            document.getElementById('langBtn').innerText = lang.lang;
        }

        function share() {
            if (navigator.share) {
                navigator.share({ title: 'إذاعة القرآن الكريم', url: window.location.href });
            } else {
                alert("انسخ رابط الصفحة وشاركه لتنال الأجر!");
            }
        }
    </script>
</body>
</html>
