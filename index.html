<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ختمتنا الخاصة 🌙☀️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #1a1a1a;
            --primary: #4a90e2;
            --secondary: #e91e63;
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: rgba(30, 30, 30, 0.9);
            --text: #ffffff;
            --primary: #82b1ff;
            --secondary: #ff80ab;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.4s ease;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* زر التبديل (شمس/قمر) */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            line-height: 1;
        }

        /* شاشة كود السر */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* المحتوى الرئيسي */
        #main-content { display: none; width: 100%; max-width: 900px; text-align: center; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--shadow);
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
            background: var(--bg);
            color: var(--text);
            text-align: center;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(128, 128, 128, 0.1);
            color: var(--text);
            font-size: 0.8rem;
        }

        .btn:hover { background: var(--primary); color: white; }

        h2 { margin-bottom: 5px; }
        .user-name { font-size: 1.8rem; font-weight: bold; }
        .dobi { color: var(--primary); }
        .dobidobi { color: var(--secondary); }
    </style>
</head>
<body data-theme="light">

    <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>أهلاً بكما ❤️</h2>
            <p>أدخل كود السر السري لرؤية الختمة</p>
            <input type="password" id="secret-code" placeholder="****" oninput="checkCode()">
        </div>
    </div>

    <div id="main-content">
        <h1 style="font-size: 2.5rem;">📖 ختمتنا المباركة</h1>
        
        <div class="container">
            <div class="card">
                <div class="user-name dobi">دوبي</div>
                <div class="progress-bar">
                    <div id="dobi-fill" class="progress-fill" style="background: var(--primary);"></div>
                </div>
                <div id="dobi-status">0 / 604 صفحة</div>
                <input type="number" id="dobi-input" placeholder="رقم الصفحة..." oninput="update('dobi')">
                <div class="btn-group">
                    <button class="btn" onclick="add('dobi', 1)">+1</button>
                    <button class="btn" onclick="add('dobi', 10)">+10</button>
                    <button class="btn" onclick="add('dobi', 20)">+جزء</button>
                </div>
            </div>

            <div class="card">
                <div class="user-name dobidobi">دوبي دوبي</div>
                <div class="progress-bar">
                    <div id="dobidobi-fill" class="progress-fill" style="background: var(--secondary);"></div>
                </div>
                <div id="dobidobi-status">0 / 604 صفحة</div>
                <input type="number" id="dobidobi-input" placeholder="رقم الصفحة..." oninput="update('dobidobi')">
                <div class="btn-group">
                    <button class="btn" onclick="add('dobidobi', 1)">+1</button>
                    <button class="btn" onclick="add('dobidobi', 10)">+10</button>
                    <button class="btn" onclick="add('dobidobi', 20)">+جزء</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SECRET = "2024"; // يمكنك تغيير كود السر من هنا
        const total = 604;

        // اكتشاف ثيم النظام تلقائياً
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            setTheme('dark');
        }

        function checkCode() {
            const code = document.getElementById('secret-code').value;
            if(code === SECRET) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData();
            }
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        function update(user) {
            let val = parseInt(document.getElementById(user + '-input').value) || 0;
            if(val > total) val = total;
            save(user, val);
            render(user, val);
        }

        function add(user, num) {
            let current = parseInt(document.getElementById(user + '-input').value) || 0;
            let newVal = Math.min(current + num, total);
            document.getElementById(user + '-input').value = newVal;
            update(user);
        }

        function save(user, val) {
            localStorage.setItem('quran_v3_' + user, val);
        }

        function loadData() {
            ['dobi', 'dobidobi'].forEach(user => {
                const val = localStorage.getItem('quran_v3_' + user) || 0;
                document.getElementById(user + '-input').value = val;
                render(user, val);
            });
        }

        function render(user, val) {
            const percent = (val / total) * 100;
            document.getElementById(user + '-fill').style.width = percent + '%';
            document.getElementById(user + '-status').innerText = `${val} / ${total} صفحة (${Math.floor(percent)}%)`;
        }
    </script>
</body>
</html>
