<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Quran | إذاعة القرآن الكريم</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.8);
            --neon-color: #00f2ff;
            --text-color: #ffffff;
            --shadow: 0 0 15px #00f2ff, 0 0 30px rgba(0, 242, 255, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --neon-color: #007bff;
            --text-color: #1a1a1a;
            --shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: 0.3s;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--neon-color);
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; text-shadow: var(--shadow); }

        .controls { margin: 20px 0; }
        
        button {
            background: transparent;
            border: 1px solid var(--neon-color);
            color: var(--text-color);
            padding: 10px 20px;
            margin: 5px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-color);
            color: #000;
            box-shadow: var(--shadow);
        }

        audio {
            width: 100%;
            margin-top: 20px;
            filter: drop-shadow(var(--shadow));
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .dev-name { color: var(--neon-color); font-weight: bold; }

        /* لغات */
        [lang="en"] { direction: ltr; }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div class="top-nav">
        <button onclick="toggleLanguage()" id="langBtn">English</button>
        <button onclick="toggleTheme()" id="themeBtn">☀️/🌙</button>
    </div>

    <h1 id="title">إذاعة القرآن الكريم</h1>
    <p id="subtitle">بث مباشر من القاهرة</p>

    <audio id="radioPlayer" controls>
        <source src="https://n02.radiojar.com/8s5u8tp7sq5tv" type="audio/mpeg">
    </audio>

    <div class="controls">
        <button onclick="refreshRadio()" id="refreshBtn">تحديث البث 🔄</button>
    </div>

    <div class="footer">
        <p id="devText">تم التطوير بواسطة <span class="dev-name">Osama</span></p>
    </div>
</div>

<script>
    const player = document.getElementById('radioPlayer');
    const htmlTag = document.documentElement;
    
    // 1. نظام الثيم التلقائي واليدوي
    function setTheme(theme) {
        htmlTag.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }

    // التحقق من إعدادات النظام
    const osTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    setTheme(localStorage.getItem('theme') || osTheme);

    function toggleTheme() {
        const current = htmlTag.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // 2. تبديل اللغة
    let currentLang = 'ar';
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        htmlTag.setAttribute('lang', currentLang);
        htmlTag.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        
        const content = {
            ar: { title: "إذاعة القرآن الكريم", subtitle: "بث مباشر من القاهرة", refresh: "تحديث البث 🔄", dev: "تم التطوير بواسطة ", lang: "English" },
            en: { title: "Quran Radio", subtitle: "Live from Cairo", refresh: "Refresh Stream 🔄", dev: "Developed by ", lang: "العربية" }
        };

        document.getElementById('title').innerText = content[currentLang].title;
        document.getElementById('subtitle').innerText = content[currentLang].subtitle;
        document.getElementById('refreshBtn').innerText = content[currentLang].refresh;
        document.getElementById('devText').innerHTML = content[currentLang].dev + '<span class="dev-name">Osama</span>';
        document.getElementById('langBtn').innerText = content[currentLang].lang;
    }

    // 3. تحديث البث
    function refreshRadio() {
        player.src = "https://n02.radiojar.com/8s5u8tp7sq5tv?random=" + Math.random();
        player.play();
    }
</script>

</body>
</html>
